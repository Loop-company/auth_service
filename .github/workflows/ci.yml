name: Auth Service CI/CD

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: auth/go.mod
          cache: true
          cache-dependency-path: auth/go.sum

      - name: Build auth service
        working-directory: auth
        run: go build ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: auth/go.mod
          cache: true
          cache-dependency-path: auth/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: auth

  test:
    name: Test and coverage
    runs-on: ubuntu-latest
    needs: [build, lint]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: auth/go.mod
          cache: true
          cache-dependency-path: auth/go.sum

      - name: Run tests with coverage
        working-directory: auth
        run: go test -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/... ./...

      - name: Generate coverage report
        working-directory: auth
        run: go tool cover -func=coverage.out > coverage.txt

      - name: Check coverage threshold
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ./.testcoverage.yml

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-coverage
          path: |
            auth/coverage.out
            auth/coverage.txt

  docker_build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./auth
          file: ./auth/Dockerfile
          push: false
          tags: auth-service:${{ github.sha }}

  docker_push:
    name: Docker push
    runs-on: ubuntu-latest
    needs: [docker_build]
    if: github.event_name == 'push'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./auth
          file: ./auth/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:${{ github.sha }}
