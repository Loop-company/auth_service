name: Auth Service CI/CD

on:
  push:
  pull_request:

env:
  COVERAGE_THRESHOLD: "50"

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: auth/go.mod
          cache: true
          cache-dependency-path: auth/go.sum

      - name: Build auth service
        working-directory: auth
        run: go build ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: auth/go.mod
          cache: true
          cache-dependency-path: auth/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: auth
          args: --timeout=5m

  test:
    name: Test and coverage
    runs-on: ubuntu-latest
    needs: [build, lint]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: auth/go.mod
          cache: true
          cache-dependency-path: auth/go.sum

      - name: Run tests with coverage
        working-directory: auth
        run: go test -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/... ./...

      - name: Check coverage threshold
        working-directory: auth
        shell: bash
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          awk -v threshold="$COVERAGE_THRESHOLD" '
            /^total:/ {
              gsub(/%/, "", $3)
              if ($3 + 0 < threshold + 0) {
                printf("coverage %.1f%% is below %.1f%%\n", $3, threshold)
                exit 1
              }
              printf("coverage %.1f%% meets threshold %.1f%%\n", $3, threshold)
            }
          ' coverage.txt

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-coverage
          path: |
            auth/coverage.out
            auth/coverage.txt

  docker_build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [build, lint, test]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Resolve Docker image metadata
        id: meta
        shell: bash
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          branch_slug=$(echo "$branch" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')
          namespace="$DOCKERHUB_NAMESPACE"
          if [ -z "$namespace" ]; then
            namespace=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          fi
          short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"
          echo "tag=${branch_slug}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./auth
          file: ./auth/Dockerfile
          push: false
          load: true
          tags: docker.io/${{ steps.meta.outputs.namespace }}/auth-service:${{ steps.meta.outputs.tag }}

      - name: Save Docker image
        shell: bash
        run: |
          mkdir -p images
          docker save docker.io/${{ steps.meta.outputs.namespace }}/auth-service:${{ steps.meta.outputs.tag }} -o images/auth-service.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-image
          path: images/auth-service.tar

  docker_push:
    name: Docker push
    runs-on: ubuntu-latest
    needs: [docker_build]
    if: github.event_name == 'push'

    steps:
      - name: Resolve Docker image metadata
        id: meta
        shell: bash
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          branch_slug=$(echo "$branch" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')
          namespace="$DOCKERHUB_NAMESPACE"
          if [ -z "$namespace" ]; then
            namespace=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          fi
          short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"
          echo "tag=${branch_slug}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: auth-service-image
          path: images

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Load and push Docker image
        shell: bash
        run: |
          docker load -i images/auth-service.tar
          docker push docker.io/${{ steps.meta.outputs.namespace }}/auth-service:${{ steps.meta.outputs.tag }}
