services:
  # auth service
  auth-service:
    build:
      context: ../../auth_service/auth
      dockerfile: Dockerfile
    container_name: authentication-backend
    env_file:
      - ../../auth_service/auth/.env
    ports:
      - "8080:8080"
    depends_on:
      - db-auth
      - redis-auth
    networks:
      - backend-network

  # auth postgres
  db-auth:
    image: postgres:15
    container_name: jwt-auth-db
    env_file:
      - ../../auth_service/auth/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network

  # auth redis
  redis-auth:
    image: redis:7-alpine
    container_name: jwt-auth-redis
    networks:
      - backend-network

volumes:
  postgres_data:

networks:
  backend-network:
    external: true
